# ── Railway configuration for Flashscore Scraper ──────────────────
# Deploys as a cron worker that scrapes on a schedule.
# ScoreWise (on Railway) reads the JSON output via shared volume
# or the scraper POSTs directly via webhook.

[build]
dockerfile = "Dockerfile"

[deploy]
# Railway cron worker — does not need a public port
# Set restartPolicyType to ON_FAILURE so Railway retries if scraper crashes
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Cron schedules ───────────────────────────────────────────────
# Scrape today's matches every day at 6 AM UTC
# Scrape tomorrow's matches every day at 6:30 AM UTC

[[cron]]
# Main scrape: Today's matches
schedule = "0 6 * * *"
command = "python run_scraper_railway.py --day Today"

[[cron]]
# Pre-load tomorrow's matches
schedule = "30 6 * * *"
command = "python run_scraper_railway.py --day Tomorrow"

# ── Environment variables (set in Railway dashboard) ─────────────
# SCOREWISE_WEBHOOK_URL - ScoreWise ingestion endpoint
# SCOREWISE_API_KEY    - API key for the ingestion endpoint
# SCRAPER_LOG_LEVEL    - Log level (default: INFO)
