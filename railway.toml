# ── Railway configuration for Flashscore Scraper ──────────────────
# Deploys as a web service so Railway assigns a PORT and exposes the
# FastAPI control server.  Scrapes are triggered via POST /scrape.
# A separate cron job (external) calls POST /scrape on schedule.

[build]
dockerfile = "Dockerfile"

[deploy]
# Web service — Railway assigns a $PORT and routes traffic to it
startCommand = "python api_server.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Environment variables (set in Railway dashboard) ─────────────
# PORT                  - Assigned automatically by Railway
# SCOREWISE_WEBHOOK_URL - ScoreWise ingestion endpoint
# SCOREWISE_API_KEY    - API key for the ingestion endpoint
# SCRAPER_LOG_LEVEL    - Log level (default: INFO)
# SCRAPER_CRON_SCHEDULE - Optional: "0 6 * * *" to enable built-in cron
