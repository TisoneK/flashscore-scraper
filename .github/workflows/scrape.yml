name: Scrape Flashscore

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Day to scrape (Today or Tomorrow)"
        required: false
        default: "Today"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Verify Chrome installation
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          google-chrome --version || chromium-browser --version || echo "Chrome version check failed"
          which google-chrome || which chromium-browser || echo "Chrome not found on PATH"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install chromedriver-autoinstaller

      - name: Install ChromeDriver via webdriver-manager
        run: |
          # Pre-cache ChromeDriver using webdriver-manager so it's available
          python -c "
          from webdriver_manager.chrome import ChromeDriverManager
          path = ChromeDriverManager().install()
          print(f'ChromeDriver installed at: {path}')
          " || echo "webdriver-manager pre-install failed, will retry at runtime"

      - name: Apply CI configuration
        run: |
          if [ -f config.ci.json ]; then
            cp config.ci.json src/config.json
            echo "CI config applied"
          fi

      - name: Run scraper
        env:
          DAY: ${{ github.event.inputs.day || 'Today' }}
          WEBHOOK_URL: ${{ secrets.SCOREWISE_WEBHOOK_URL }}
          API_KEY: ${{ secrets.SCOREWISE_API_KEY }}
        run: |
          ARGS="--day $DAY"
          if [ -n "$WEBHOOK_URL" ]; then
            ARGS="$ARGS --webhook-url $WEBHOOK_URL"
          fi
          if [ -n "$API_KEY" ]; then
            ARGS="$ARGS --api-key $API_KEY"
          fi
          python run_scraper_ci.py $ARGS

      - name: Upload JSON output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraped-matches
          path: output/json/
          retention-days: 30

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-logs
          path: output/logs/
          retention-days: 7

      - name: Push JSON to data branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data || true
          git checkout data 2>/dev/null || git checkout --orphan data
          git rm -rf . 2>/dev/null || true
          cp -r output/json/*.json . 2>/dev/null || true
          git add "*.json"
          git commit -m "scrape: $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push origin data --force
